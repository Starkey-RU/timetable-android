name: nightly

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: создать debug keystore для подписи
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: собрать release apk
        run: ./gradlew assembleRelease --no-daemon

      - name: подчистить старый nightly если был
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true

      - name: опубликовать свежую сборку
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # короткий хеш и дата последнего коммита идут в тело релиза
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --pretty=%cd --date=iso)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          gh release create nightly \
            app/build/outputs/apk/release/app-release.apk \
            --prerelease \
            --title "Свежая сборка (nightly)" \
            --notes "Автоматическая сборка из main.

          Коммит: ${SHORT_SHA} - ${COMMIT_MSG}
          Дата: ${COMMIT_DATE}

          APK для установки на Android 12+ (minSdk 31). Это превью-сборка, для стабильной версии смотри релизы v1.0 и выше."
